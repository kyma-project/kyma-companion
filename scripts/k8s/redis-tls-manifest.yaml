apiVersion: v1
kind: Namespace
metadata:
  name: redis
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-tls-config
  namespace: redis
data:
  redis.conf: |
    tls-port 6380
    port 0
    tls-cert-file /tls/redis.crt
    tls-key-file /tls/redis.key
    tls-ca-cert-file /tls/ca.crt
    tls-auth-clients no
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        command: ["redis-server", "/etc/redis/redis.conf"]
        ports:
        - containerPort: 6380
        volumeMounts:
        - name: config
          mountPath: /etc/redis
        - name: tls
          mountPath: /tls
      volumes:
      - name: config
        configMap:
          name: redis-tls-config
      - name: tls
        secret:
          secretName: redis-tls-certs
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: redis
spec:
  type: NodePort
  selector:
    app: redis
  ports:
  - port: 6380
    targetPort: 6380
    nodePort: 32100
