apiVersion: v1
kind: Namespace
metadata:
  name: test-deployment-15
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: case15-app
  name: test-deployment-15
  namespace: test-deployment-15
spec:
  replicas: 1
  selector:
    matchLabels:
      app: case15-app
  template:
    metadata:
      labels:
        app: case15-app
    spec:
      containers:
        - image: python:3.12-alpine
          name: main
          command:
            - python
            - -c
            - |
              import time
              blocks = []
              while True:
                  blocks.append(bytearray(10 * 1024 * 1024))
                  time.sleep(0.1)
          resources:
            limits:
              memory: "32Mi"
              cpu: "250m"
            requests:
              memory: "16Mi"
              cpu: "250m"
