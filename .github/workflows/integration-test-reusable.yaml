name: Integration Test (privileged)

## **IMPORTANT**: If any changes are made to how to run the integration tests. Make sure to update the steps for
## integration-tests in the create-release.yml workflow as well.

on:
  workflow_run:
    workflows: ["Integration Test"]
    types: [completed]

permissions: read-all

jobs:
  check-author:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      pr-number: ${{ steps.load-context.outputs.pr-number }}
      head-ref: ${{ steps.load-context.outputs.head-ref }}
      head-repo: ${{ steps.load-context.outputs.head-repo }}
      has-label: ${{ steps.load-context.outputs.has-label }}
    steps:
      - name: Download PR context artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            const artifact = artifacts.data.artifacts.find(a => a.name.startsWith('pr-context-'));
            if (!artifact) core.setFailed('No PR context artifact found');
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });
            const fs = require('fs');
            fs.writeFileSync('/tmp/pr-context.zip', Buffer.from(download.data));

      - name: Extract PR context
        run: |
          unzip /tmp/pr-context.zip -d /tmp/pr-context
          cat /tmp/pr-context/pr-context.json

      - name: Load PR context and check author
        id: load-context
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const ctx = JSON.parse(fs.readFileSync('/tmp/pr-context/pr-context.json', 'utf8'));
            core.setOutput('pr-number', ctx.pr_number);
            core.setOutput('head-ref', ctx.head_ref);
            core.setOutput('head-repo', ctx.head_repo);
            const hasLabel = ctx.labels.includes('run-integration-test');
            core.setOutput('has-label', hasLabel.toString());
            try {
              await github.rest.teams.getMembershipForUserInOrg({
                org: 'kyma-project',
                team_slug: 'ai-force',
                username: context.payload.workflow_run.triggering_actor.login,
              });
            } catch {
              core.setFailed(`PR author ${context.payload.workflow_run.triggering_actor.login} is not a codeowner.`);
            }

  integration-test:
    needs: check-author
    if: needs.check-author.outputs.has-label == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-author.outputs.head-ref }}
          repository: ${{ needs.check-author.outputs.head-repo }}

      - name: Extract Python version
        id: python-version
        run: ./scripts/shell/extract-python-version.sh

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run integration tests
        env:
          LOG_LEVEL: "DEBUG"
        run: |
          echo "${{ secrets.INTEGRATION_TEST_CONFIG }}" | base64 --decode | jq > $GITHUB_WORKSPACE/config/config.json
          poetry run poe test-integration
