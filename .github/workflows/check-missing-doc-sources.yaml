name: Check for Undiscovered Doc Sources

on:
  schedule:
    - cron: "0 8 * * 6"  # Every Saturday at 08:00 UTC (before index rebuild)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-sources:
    name: Discover new sources and detect drift, open combined PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run discovery and drift checks, open combined PR if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/python/check_missing_sources.py --auto-add
          DRIFT=$(python scripts/python/check_source_drift.py --auto-fix 2>&1)
          echo "$DRIFT"

          if git diff --quiet doc_indexer/docs_sources.json; then
            echo "No changes to docs_sources.json — nothing to PR."
            exit 0
          fi

          if gh pr list --state open --search "chore: doc sources update" \
              --json number --jq '.[0].number' | grep -q .; then
            echo "A doc sources update PR is already open. Skipping."
            exit 0
          fi

          BRANCH="chore/doc-sources-update-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add doc_indexer/docs_sources.json
          git commit -m "chore: auto-update doc sources (new repos + drift fixes)"
          git push origin "$BRANCH"

          {
            echo "This PR was auto-generated by the weekly doc sources check workflow."
            echo ""
            echo "Both new repo discovery (\`check_missing_sources.py\`) and drift"
            echo "detection (\`check_source_drift.py\`) ran and applied conservative"
            echo "fixes to \`doc_indexer/docs_sources.json\`."
            echo ""
            echo "**Review the diff**, then use \`/triage-companion-doc-sources\` to:"
            echo "- Remove internal tooling repos"
            echo "- Adjust \`include_files\` patterns (script now shows detected subdirs)"
            echo ""
            if echo "$DRIFT" | grep -qE "NEW_PATH|DEAD"; then
              echo "## Drift findings (auto-applied)"
              echo ""
              echo "\`\`\`"
              echo "$DRIFT"
              echo "\`\`\`"
            fi
          } > /tmp/pr-body.txt

          gh pr create \
            --title "chore: doc sources update — review and triage" \
            --body-file /tmp/pr-body.txt \
            --base main \
            --head "$BRANCH"
