name: All Checks Passed

permissions:
  contents: read

on:
  pull_request:
    types:
      [
        opened,
        synchronize,
        reopened,
        ready_for_review,
        edited,
        labeled,
        milestoned,
      ]

jobs:
  all-checks:
    runs-on: ubuntu-latest
    permissions:
      checks: read # Required for checking the status of actions
      contents: read
    steps:
      - name: Check if all checks passed
        uses: wechuli/allcheckspassed@2d075c11ec321da095a716c70c07c7327eeb68a3 # v2.3.0
        with:
          delay: "1" # minutes
          retries: "10"
          polling_interval: "1" # minutes
