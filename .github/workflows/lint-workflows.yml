name: Lint GitHub Actions workflows

# Runs actionlint against all workflow files on PRs that touch .github/workflows/.
on:
  pull_request:
    branches:
      - "main"
      - "release-**"
    paths:
      - ".github/workflows/**"

jobs:
  actionlint:
    name: Run actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: none

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12
