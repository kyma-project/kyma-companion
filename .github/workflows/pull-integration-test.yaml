name: Integration Test

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened, ready_for_review]
    branches:
      - "main"
      - "release-**"

permissions: read-all

jobs:
  save-pr-context:
    runs-on: ubuntu-latest
    steps:
      - name: Save PR context as artifact
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          mkdir -p /tmp/pr-context
          echo '{}' | jq \
            --arg pr_number "$PR_NUMBER" \
            --arg head_sha "$PR_HEAD_SHA" \
            --arg head_ref "$PR_HEAD_REF" \
            --arg head_repo "$PR_HEAD_REPO" \
            --argjson labels "$PR_LABELS" \
            '{pr_number: $pr_number, head_sha: $head_sha, head_ref: $head_ref, head_repo: $head_repo, labels: $labels}' \
            > /tmp/pr-context/pr-context.json
          cat /tmp/pr-context/pr-context.json

      - name: Upload PR context artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-context-${{ github.event.pull_request.head.sha }}
          path: /tmp/pr-context/pr-context.json
          retention-days: 1
