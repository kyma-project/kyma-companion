name: Pull Build Image LangFuse

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - "Dockerfile.langfuse"
      - "Dockerfile.langfuse-worker"

permissions: read-all

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Check codeowner authorization
        uses: kyma-project/kyma-companion/.github/actions/check-codeowner-auth@main
        with:
          github-token: ${{ secrets.GIT_BOT_TOKEN }}

  build-langfuse:
    needs: authorize
    permissions:
      id-token: write # This is required for requesting the JWT token
      contents: read # This is required for actions/checkout
    uses: kyma-project/test-infra/.github/workflows/image-builder.yml@main
    with:
      name: external-langfuse
      dockerfile: Dockerfile.langfuse
      context: .
      export-tags: true
      platforms: |
        linux/amd64
  build-langfuse-worker:
    needs: authorize
    permissions:
      id-token: write # This is required for requesting the JWT token
      contents: read # This is required for actions/checkout
    uses: kyma-project/test-infra/.github/workflows/image-builder.yml@main
    with:
      name: external-langfuse-worker
      dockerfile: Dockerfile.langfuse-worker
      context: .
      export-tags: true
      platforms: |
        linux/amd64
