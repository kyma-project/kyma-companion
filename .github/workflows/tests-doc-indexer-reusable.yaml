name: pull-tests-doc-indexer (privileged)

on:
  workflow_run:
    workflows: ["pull-tests-doc-indexer"]
    types: [completed]

permissions: read-all

jobs:
  check-author:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      pr-number: ${{ steps.load-context.outputs.pr-number }}
      head-ref: ${{ steps.load-context.outputs.head-ref }}
      head-repo: ${{ steps.load-context.outputs.head-repo }}
    steps:
      - name: Download PR context artifact
        uses: actions/github-script@v8
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            const artifact = artifacts.data.artifacts.find(a => a.name.startsWith('pr-context-doc-indexer-'));
            if (!artifact) core.setFailed('No PR context artifact found');
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });
            const fs = require('fs');
            fs.writeFileSync('/tmp/pr-context.zip', Buffer.from(download.data));

      - name: Extract PR context
        run: unzip /tmp/pr-context.zip -d /tmp/pr-context

      - name: Load PR context and check author
        id: load-context
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const ctx = JSON.parse(fs.readFileSync('/tmp/pr-context/pr-context.json', 'utf8'));
            core.setOutput('pr-number', ctx.pr_number);
            core.setOutput('head-ref', ctx.head_ref);
            core.setOutput('head-repo', ctx.head_repo);
            if (ctx.labels.includes('ok-to-test')) return;
            try {
              await github.rest.teams.getMembershipForUserInOrg({
                org: 'kyma-project',
                team_slug: 'ai-force',
                username: context.payload.workflow_run.triggering_actor.login,
              });
            } catch {
              core.setFailed(`PR author ${context.payload.workflow_run.triggering_actor.login} is not a codeowner.`);
            }

  tests:
    needs: check-author
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-type: [unit, integration]
    name: Tests (${{ matrix.test-type }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-author.outputs.head-ref }}
          repository: ${{ needs.check-author.outputs.head-repo }}

      - name: Extract Python version
        id: python-version
        working-directory: ./doc_indexer
        run: |
          ../scripts/shell/extract-python-version.sh
          echo "Got PYTHON_VERSION=${PYTHON_VERSION}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: ./doc_indexer
        run: poetry install --with test

      - name: Run unit tests
        if: matrix.test-type == 'unit'
        working-directory: ./doc_indexer
        env:
          LOG_LEVEL: "DEBUG"
          DOCS_SOURCES_FILE_PATH: "./docs_sources.json"
          DOCS_PATH: "/test-data"
          DOCS_TABLE_NAME: "kc_pr_${{ needs.check-author.outputs.pr-number }}"
        run: |
          poetry run poe test-unit

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        working-directory: ./doc_indexer
        env:
          LOG_LEVEL: "DEBUG"
          DOCS_SOURCES_FILE_PATH: "./docs_sources.json"
          DOCS_PATH: "/test-data"
          DOCS_TABLE_NAME: "kc_pr_${{ needs.check-author.outputs.pr-number }}"
        run: |
          export CONFIG_PATH=$GITHUB_WORKSPACE/config/config.json
          echo "${{ secrets.DOC_INDEXER_TESTS_CONFIG }}" | base64 --decode | jq > $CONFIG_PATH
          poetry run poe test-integration
