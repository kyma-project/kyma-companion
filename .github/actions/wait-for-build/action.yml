name: "Wait for build"
description: "Waits for a GitHub check run to complete successfully before proceeding."

inputs:
  git-ref:
    description: "The commit SHA to poll."
    required: true
  check-run-name:
    description: "The name of the check run to wait for (e.g. 'build / Build image')."
    required: true
  interval:
    description: "Polling interval in seconds."
    required: false
    default: "60"
  timeout:
    description: "Maximum wait time in seconds."
    required: false
    default: "900"

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: main

    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install requirements
      shell: bash
      run: |
        pip install -r ./scripts/python/wait-for-commit-check/requirements.txt

    - name: Wait for build
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GIT_REF: "${{ inputs.git-ref }}"
        REPOSITORY_FULL_NAME: "${{ github.repository }}"
        GIT_CHECK_RUN_NAME: "${{ inputs.check-run-name }}"
        INTERVAL: "${{ inputs.interval }}"
        TIMEOUT: "${{ inputs.timeout }}"
      run: |
        python ./scripts/python/wait-for-commit-check/run.py
